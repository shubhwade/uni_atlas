<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>University - AbroadReady</title>
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/university-detail.css" />
  </head>
  <body>
    <div id="appNav"></div>
    <main class="page">
      <div class="container">
        <div class="row wrap" style="justify-content:space-between;align-items:flex-end">
          <div>
            <h1 class="h1" id="title">University</h1>
            <p class="muted" id="sub">Loading...</p>
          </div>
          <div class="row wrap">
            <button class="btn sm" id="saveBtn" type="button">Save</button>
            <a class="btn sm" href="/universities">Back</a>
          </div>
        </div>

        <div class="spacer"></div>

        <section class="grid cols-2">
          <div class="card pad" id="overview"></div>
          <div class="card pad">
            <div class="h2">Courses</div>
            <div class="caption muted">Select a course to view details and run predictions.</div>
            <div class="spacer"></div>
            <div id="courses" class="grid"></div>
          </div>
        </section>
      </div>
    </main>
    <script src="/js/global.js"></script>
    <script src="/js/university-detail.js"></script>
  </body>
</html>
