<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in - AbroadReady</title>
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/login.css" />
  </head>
  <body>
    <main class="page">
      <div class="container auth">
        <section class="auth__brand">
          <a class="auth-logo" href="/">
            <span class="auth-logo__mark" aria-hidden="true"><span></span></span>
            <span>AbroadReady</span>
          </a>

          <div class="auth__art" aria-hidden="true">
            <div class="auth__face"><span></span></div>
            <div class="auth__tag auth__tag--one">Admit odds ready</div>
            <div class="auth__tag auth__tag--two">Budget risk checked</div>
            <div class="auth__match">
              <div class="auth__match-head">
                <span class="uni-icon">U</span>
                <strong>MIT</strong>
              </div>
              <div class="match-tag">94% Match</div>
            </div>
          </div>

          <div>
            <h1 class="h1">Welcome back to your application cockpit.</h1>
            <p class="muted">Pick up your shortlist, profile score, scholarships, and loan plan.</p>
            <div class="auth__bullets">
              <div class="badge info">Profile scoring</div>
              <div class="badge info">Admit prediction</div>
              <div class="badge info">Loans + budgets</div>
            </div>
          </div>
        </section>

        <section class="auth__panel">
          <div class="auth__panelHead">
            <p class="eyebrow">Login</p>
            <h2>Sign in</h2>
          </div>

          <form id="loginForm" class="form">
            <label class="caption">Email</label>
            <input class="input" name="email" type="email" autocomplete="email" required />
            <div class="spacer"></div>
            <label class="caption">Password</label>
            <input class="input" name="password" type="password" autocomplete="current-password" required />
            <div class="spacer"></div>
            <button class="btn primary full" type="submit">Sign in</button>
          </form>

          <div class="spacer"></div>

          <div class="row wrap">
            <a class="btn full" href="/register">Create account</a>
            <button class="btn full" id="magicLinkBtn" type="button">Email me a magic link</button>
          </div>

          <div class="auth__divider"><span>or</span></div>

          <a class="btn full btn--google" href="/auth/google">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
              <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            Sign in with Google
          </a>
          <p class="caption muted" id="authNote"></p>
        </section>
      </div>
    </main>

    <script src="/js/global.js"></script>
    <script src="/js/login.js"></script>
  </body>
</html>
