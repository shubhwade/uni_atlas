<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin • AbroadReady</title>
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/admin.css" />
  </head>
  <body data-requires-auth="1">
    <div id="appNav"></div>
    <main class="page">
      <div class="container">
        <h1 class="h1">Admin</h1>
        <p class="muted">Sync jobs and stats (requires admin session).</p>
        <div class="spacer"></div>
        <section class="grid cols-2">
          <div class="card pad">
            <div class="h2">Sync</div>
            <div class="spacer"></div>
            <div class="row wrap">
              <button class="btn" id="syncUni" type="button">Sync US Universities</button>
              <button class="btn" id="syncForex" type="button">Sync Forex</button>
            </div>
            <div class="spacer"></div>
            <div class="caption muted" id="syncOut"></div>
          </div>
          <div class="card pad">
            <div class="h2">Stats</div>
            <div class="spacer"></div>
            <div id="stats" class="grid"></div>
          </div>
        </section>
      </div>
    </main>
    <script src="/js/global.js"></script>
    <script src="/js/admin.js"></script>
  </body>
</html>
